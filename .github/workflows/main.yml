name: Бизнес помощник

on:
  schedule:
    # Каждый будний день в 9:00 UTC (12:00 MSK)
    - cron: '0 9 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Режим: today (сегодня), deadlines (дедлайны), all (всё)'
        required: false
        default: 'today'
        type: choice
        options:
          - today
          - deadlines
          - all

jobs:
  send-notification:
    runs-on: ubuntu-latest
    steps:
      - name: Загружаем код
        uses: actions/checkout@v4

      - name: Устанавливаем jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Определяем день недели
        id: day_of_week
        run: |
          DAY_NUM=$(date +%u)
          case $DAY_NUM in
            1) echo "day=понедельник" >> $GITHUB_OUTPUT ;;
            2) echo "day=вторник" >> $GITHUB_OUTPUT ;;
            3) echo "day=среда" >> $GITHUB_OUTPUT ;;
            4) echo "day=четверг" >> $GITHUB_OUTPUT ;;
            5) echo "day=пятница" >> $GITHUB_OUTPUT ;;
            6) echo "day=суббота" >> $GITHUB_OUTPUT ;;
            7) echo "day=воскресенье" >> $GITHUB_OUTPUT ;;
          esac

      - name: Читаем конфигурацию
        id: config
        run: |
          if [ -f config.json ]; then
            PROJECT_NAME=$(jq -r '.project_name' config.json)
            echo "project_name=$PROJECT_NAME" >> $GITHUB_OUTPUT
          else
            echo "project_name=Бизнес помощник" >> $GITHUB_OUTPUT
          fi

      - name: Генерируем сообщение
        id: message
        run: |
          MODE="${{ github.event.inputs.mode || 'today' }}"
          DAY="${{ steps.day_of_week.outputs.day }}"
          DAY_CAP="$(echo ${DAY:0:1} | tr 'a-z' 'A-Z')${DAY:1}"
          
          echo "DEBUG: Mode=$MODE, Day=$DAY, DayCap=$DAY_CAP"
          
          # Проверяем, существует ли tasks.json
          if [ ! -f tasks.json ]; then
            echo "ERROR: tasks.json не найден!"
            exit 1
          fi
          
          # Создаём сообщение
          {
            echo "📅 ПЛАН НА $DAY_CAP"
            echo ""
            echo "Задачи на сегодня:"
            
            # Проверяем, есть ли данные для этого дня
            if jq -e ".\"$DAY\"" tasks.json > /dev/null 2>&1; then
              echo "DEBUG: Найден раздел '$DAY' в tasks.json"
              
              while IFS= read -r task_line; do
                TIME=$(echo "$task_line" | jq -r '.time')
                TASK=$(echo "$task_line" | jq -r '.task')
                echo "• $TIME — $TASK"
              done < <(jq -c ".\"$DAY\"[]" tasks.json)
            else
              echo "DEBUG: Раздел '$DAY' не найден, показываю все ключи:"
              jq 'keys' tasks.json
              echo "✅ Задач на сегодня нет"
            fi
            
            echo ""
            echo "Успешного рабочего дня! 💼"
          } > message.txt
          
          echo "DEBUG: Содержимое message.txt:"
          cat message.txt
          
          # Проверяем, что файл не пустой
          if [ ! -s message.txt ]; then
            echo "ERROR: message.txt пустой!"
            exit 1
          fi
          
          # Сохраняем через heredoc для multiline
          echo 'message_content<<EOF' >> $GITHUB_OUTPUT
          cat message.txt >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT
          
          echo "DEBUG: message.txt сохранён в output"

      - name: Отправляем в Telegram
        run: |
          echo "DEBUG: Полученное сообщение:"
          echo "${{ steps.message.outputs.message_content }}"
          
          if [ -z "${{ steps.message.outputs.message_content }}" ]; then
            echo "ERROR: Сообщение пустое!"
            exit 1
          fi
          
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=${{ steps.message.outputs.message_content }}"