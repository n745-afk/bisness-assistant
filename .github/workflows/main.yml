name: Бизнес помощник

on:
  schedule:
    # Каждый будний день в 9:00 UTC (12:00 MSK)
    - cron: '0 9 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Режим: today (сегодня), deadlines (дедлайны), all (всё)'
        required: false
        default: 'today'
        type: choice
        options:
          - today
          - deadlines
          - all

jobs:
  send-notification:
    runs-on: ubuntu-latest
    steps:
      - name: Загружаем код
        uses: actions/checkout@v4

      - name: Устанавливаем jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Определяем день недели
        id: day_of_week
        run: |
          DAY_NUM=$(date +%u)
          case $DAY_NUM in
            1) echo "day=понедельник" >> $GITHUB_OUTPUT ;;
            2) echo "day=вторник" >> $GITHUB_OUTPUT ;;
            3) echo "day=среда" >> $GITHUB_OUTPUT ;;
            4) echo "day=четверг" >> $GITHUB_OUTPUT ;;
            5) echo "day=пятница" >> $GITHUB_OUTPUT ;;
            6) echo "day=суббота" >> $GITHUB_OUTPUT ;;
            7) echo "day=воскресенье" >> $GITHUB_OUTPUT ;;
          esac

      - name: Читаем конфигурацию
        id: config
        run: |
          if [ -f config.json ]; then
            PROJECT_NAME=$(jq -r '.project_name' config.json)
            echo "project_name=$PROJECT_NAME" >> $GITHUB_OUTPUT
          else
            echo "project_name=Бизнес помощник" >> $GITHUB_OUTPUT
          fi

      - name: Генерируем сообщение
        id: message
        run: |
          MODE="${{ github.event.inputs.mode || 'today' }}"
          DAY="${{ steps.day_of_week.outputs.day }}"
          DAY_CAP="$(echo ${DAY:0:1} | tr 'a-z' 'A-Z')${DAY:1}"
          
          # Создаём файл с сообщением используя printf
          {
            printf "📅 *ПЛАН НА %s*\n\n" "$DAY_CAP"
            printf "*Задачи на сегодня:*\n"
            
            if jq -e ".\"$DAY\"" tasks.json > /dev/null 2>&1; then
              TASK_COUNT=$(jq ".\"$DAY\" | length" tasks.json)
              
              if [ "$TASK_COUNT" -gt 0 ]; then
                while IFS= read -r task_line; do
                  TIME=$(echo "$task_line" | jq -r '.time')
                  TASK=$(echo "$task_line" | jq -r '.task')
                  PRIORITY=$(echo "$task_line" | jq -r '.priority')
                  
                  case $PRIORITY in
                    high) ICON="🔴" ;;
                    medium) ICON="🟡" ;;
                    low) ICON="🟢" ;;
                    *) ICON="⚪" ;;
                  esac
                  
                  printf "%s %s — %s\n" "$ICON" "$TIME" "$TASK"
                done < <(jq -c ".\"$DAY\"[]" tasks.json)
              else
                printf "✅ Задач на сегодня нет\n"
              fi
            else
              printf "✅ Задач на сегодня нет\n"
            fi
            
            printf "\n_Успешного рабочего дня! 💼_\n"
          } > message.txt
          
          # Кодируем сообщение в JSON для безопасной передачи
          echo "text=$(jq -Rs . < message.txt)" >> $GITHUB_OUTPUT

      - name: Отправляем в Telegram
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${{ secrets.TELEGRAM_CHAT_ID }}\",\"text\":${{ steps.message.outputs.text }},\"parse_mode\":\"Markdown\"}"

      - name: Сохраняем историю
        run: |
          echo "$(date '+%Y-%m-%d %H:%M:%S'): Запуск выполнен - ${{ steps.day_of_week.outputs.day }}" >> history.log
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add history.log
          git commit -m "Обновление истории $(date '+%Y-%m-%d')" || echo "Нет изменений"
          git push || echo "Нечего пушить"