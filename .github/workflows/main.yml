name: Бизнес помощник

on:
  schedule:
    # Каждый будний день в 9:00 UTC (12:00 MSK)
    - cron: '0 9 * * 1-5'
  workflow_dispatch:
    # Ручной запуск
    inputs:
      mode:
        description: 'Режим: today (сегодня), deadlines (дедлайны), all (всё)'
        required: false
        default: 'today'
        type: choice
        options:
          - today
          - deadlines
          - all

jobs:
  send-notification:
    runs-on: ubuntu-latest
    steps:
      # 1. Загружаем код
      - name: Загружаем код
        uses: actions/checkout@v4
      
      # 2. Устанавливаем jq для работы с JSON
      - name: Устанавливаем jq
        run: sudo apt-get update && sudo apt-get install -y jq
      
      # 3. Определяем текущий день недели
      - name: Определяем день недели
        id: day_of_week
        run: |
          DAY_NUM=$(date +%u)
          case $DAY_NUM in
            1) echo "day=понедельник" >> $GITHUB_OUTPUT ;;
            2) echo "day=вторник" >> $GITHUB_OUTPUT ;;
            3) echo "day=среда" >> $GITHUB_OUTPUT ;;
            4) echo "day=четверг" >> $GITHUB_OUTPUT ;;
            5) echo "day=пятница" >> $GITHUB_OUTPUT ;;
            6) echo "day=суббота" >> $GITHUB_OUTPUT ;;
            7) echo "day=воскресенье" >> $GITHUB_OUTPUT ;;
          esac
      
     # 4. Генерируем сообщение
      - name: Генерируем сообщение
        id: message
        run: |
          DAY="${{ steps.day_of_week.outputs.day }}"
          DAY_CAP="$(echo ${DAY:0:1} | tr 'a-z' 'A-Z')${DAY:1}"
          
          # Используем printf для создания сообщения
          {
            printf "📅 ПЛАН НА %s\n\n" "$DAY_CAP"
            printf "Задачи на сегодня:\n"
            
            if jq -e ".\"$DAY\"" tasks.json > /dev/null 2>&1; then
              while IFS= read -r task_line; do
                TIME=$(echo "$task_line" | jq -r '.time')
                TASK=$(echo "$task_line" | jq -r '.task')
                printf "• %s — %s\n" "$TIME" "$TASK"
              done < <(jq -c ".\"$DAY\"[]" tasks.json)
            else
              printf "✅ Задач нет\n"
            fi
            
            printf "\nУспешного рабочего дня! 💼\n"
          } > message.txt
          
          # Кодируем в JSON для безопасной передачи
          echo "text=$(jq -Rs . < message.txt)" >> $GITHUB_OUTPUT

# 5. Отправляем в Telegram
      - name: Отправляем в Telegram
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${{ secrets.TELEGRAM_CHAT_ID }}\",\"text\":${{ steps.message.outputs.text }}}"