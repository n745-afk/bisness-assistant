name: Бизнес помощник

on:
  schedule:
    # Каждый будний день в 9:00 UTC (12:00 MSK)
    - cron: '0 9 * * 1-5'
  workflow_dispatch:
    # Ручной запуск
    inputs:
      mode:
        description: 'Режим: today (сегодня), deadlines (дедлайны), all (всё)'
        required: false
        default: 'today'
        type: choice
        options:
          - today
          - deadlines
          - all

jobs:
  send-notification:
    runs-on: ubuntu-latest
    steps:
      # 1. Загружаем код
      - name: Загружаем код
        uses: actions/checkout@v4
      
      # 2. Устанавливаем jq для работы с JSON
      - name: Устанавливаем jq
        run: sudo apt-get update && sudo apt-get install -y jq
      
      # 3. Определяем текущий день недели
      - name: Определяем день недели
        id: day_of_week
        run: |
          DAY_NUM=$(date +%u)
          case $DAY_NUM in
            1) echo "day=понедельник" >> $GITHUB_OUTPUT ;;
            2) echo "day=вторник" >> $GITHUB_OUTPUT ;;
            3) echo "day=среда" >> $GITHUB_OUTPUT ;;
            4) echo "day=четверг" >> $GITHUB_OUTPUT ;;
            5) echo "day=пятница" >> $GITHUB_OUTPUT ;;
            6) echo "day=суббота" >> $GITHUB_OUTPUT ;;
            7) echo "day=воскресенье" >> $GITHUB_OUTPUT ;;
          esac
      
      # 4. Генерируем сообщение
      - name: Генерируем сообщение
        id: message
        run: |
          MODE="${{ github.event.inputs.mode || 'today' }}"
          DAY="${{ steps.day_of_week.outputs.day }}"
          DAY_CAP="$(echo ${DAY:0:1} | tr 'a-z' 'A-Z')${DAY:1}"
          
          # Создаём файл с правильными переносами
          cat > message.txt << 'MSGEOF'
         MSGEOF

          if [ "$MODE" = "today" ] || [ "$MODE" = "all" ]; then
            echo "📅 ПЛАН НА $DAY_CAP" >> message.txt
            echo "" >> message.txt
            echo "Задачи на сегодня:" >> message.txt
            
            if jq -e ".\"$DAY\"" tasks.json > /dev/null 2>&1; then
              while IFS= read -r task_line; do
                TIME=$(echo "$task_line" | jq -r '.time')
                TASK=$(echo "$task_line" | jq -r '.task')
                PRIORITY=$(echo "$task_line" | jq -r '.priority')
                
                case $PRIORITY in
                  high) ICON="🔴" ;;
                  medium) ICON="🟡" ;;
                  low) ICON="🟢" ;;
                  *) ICON="⚪" ;;
                esac
                
                echo "$ICON $TIME — $TASK" >> message.txt
              done < <(jq -c ".\"$DAY\"[]" tasks.json)
            else
              echo "✅ Задач на сегодня нет" >> message.txt
            fi
          fi
          
          if [ "$MODE" = "deadlines" ] || [ "$MODE" = "all" ]; then
            echo "" >> message.txt
            echo "⏰ БЛИЖАЙШИЕ ДЕДЛАЙНЫ:" >> message.txt
            
            TODAY_DAY=$(date +%d)
            DEADLINE_COUNT=0
            
            while IFS= read -r deadline_line; do
              DEADLINE_DATE=$(echo "$deadline_line" | jq -r '.date')
              DEADLINE_TASK=$(echo "$deadline_line" | jq -r '.task')
              DAYS_LEFT=$((DEADLINE_DATE - TODAY_DAY))
              
              if [ $DAYS_LEFT -ge 0 ] && [ $DAYS_LEFT -le 7 ]; then
                if [ $DAYS_LEFT -eq 0 ]; then
                  echo "🔴 СЕГОДНЯ: $DEADLINE_TASK" >> message.txt
                elif [ $DAYS_LEFT -eq 1 ]; then
                  echo "🔴 ЗАВТРА: $DEADLINE_TASK" >> message.txt
                else
                  echo "⚡ Через $DAYS_LEFT дн: $DEADLINE_TASK" >> message.txt
                fi
                DEADLINE_COUNT=$((DEADLINE_COUNT + 1))
              fi
            done < <(jq -c '.дедлайны[]' tasks.json)
            
            if [ $DEADLINE_COUNT -eq 0 ]; then
              echo "✅ Срочных дедлайнов нет" >> message.txt
            fi
          fi
          
          echo "" >> message.txt
          echo "Успешного рабочего дня! 💼" >> message.txt
          
          # Читаем файл и сохраняем
          MESSAGE_CONTENT=$(cat message.txt)
          echo "text<<MESSAGE_END" >> $GITHUB_OUTPUT
          echo "$MESSAGE_CONTENT" >> $GITHUB_OUTPUT
          echo "MESSAGE_END" >> $GITHUB_OUTPUT

      - name: Отправляем в Telegram
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\": \"${{ secrets.TELEGRAM_CHAT_ID }}\", \"text\": $(cat message.txt | jq -Rs .)}"